
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#000;font-family:'Inter',sans-serif;color:#fff;min-height:100vh;}
  .app{display:flex;flex-direction:column;align-items:center;padding:24px 16px;min-height:100vh;background:linear-gradient(160deg,#000814 0%,#001133 50%,#000a1f 100%);}

  .title-wrap{text-align:center;margin-bottom:20px;}
  .title{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;letter-spacing:2px;color:#4fc3f7;text-transform:uppercase;}
  .title span{color:#0d47a1;}
  .title-top{font-size: 40px;}
  .subtitle{font-size:12px;color:#546e7a;letter-spacing:1px;margin-top:4px;}

  .ref-row{display:flex;align-items:center;gap:16px;margin-bottom:20px;background:rgba(13,71,161,0.15);border:0.5px solid rgba(79,195,247,0.2);border-radius:12px;padding:12px 16px;width:100%;max-width:500px;}
  .ref-img{width:200px;height:300px;border-radius:8px;object-fit:cover;border:1.5px solid #0d47a1;}
  .ref-info{flex:1;}
  .ref-label{font-size:10px;color:#546e7a;letter-spacing:1px;margin-bottom:2px;}
  .ref-name{font-size:14px;font-weight:500;color:#4fc3f7;}
  .ref-detect{font-size:11px;color:#78909c;margin-top:2px;}
  .target-badges{display:flex;gap:6px;margin-top:6px;}
  .badge{font-size:10px;padding:2px 8px;border-radius:20px;border:0.5px solid;font-weight:500;}
  .badge-eye{color:#81d4fa;border-color:#0288d1;background:rgba(2,136,209,0.15);}
  .badge-tongue{color:#f48fb1;border-color:#c2185b;background:rgba(194,24,91,0.15);}

  .cam-wrap{position:relative;width:100%;max-width:500px;margin-bottom:16px;}
  .cam-frame{position:relative;width:100%;aspect-ratio:4/3;border-radius:16px;overflow:hidden;border:1.5px solid rgba(79,195,247,0.25);background:#000d1a;}
  video,canvas.snapshot{width:100%;height:100%;object-fit:cover;display:block;border-radius:14px;}
  canvas.snapshot{display:none;position:absolute;top:0;left:0;}

  .scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4fc3f7,transparent);animation:scan 2.5s ease-in-out infinite;pointer-events:none;}
  @keyframes scan{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}

  .corner{position:absolute;width:20px;height:20px;border-color:#4fc3f7;border-style:solid;opacity:0.7;}
  .corner-tl{top:10px;left:10px;border-width:2px 0 0 2px;border-radius:3px 0 0 0;}
  .corner-tr{top:10px;right:10px;border-width:2px 2px 0 0;border-radius:0 3px 0 0;}
  .corner-bl{bottom:10px;left:10px;border-width:0 0 2px 2px;border-radius:0 0 0 3px;}
  .corner-br{bottom:10px;right:10px;border-width:0 2px 2px 0;border-radius:0 0 3px 0;}

  .face-guide{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:52%;aspect-ratio:3/4;border:1.5px dashed rgba(79,195,247,0.3);border-radius:50%;pointer-events:none;}

  .cam-status{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(79,195,247,0.6);letter-spacing:1px;white-space:nowrap;}

  .btn-row{display:flex;justify-content:center;gap:12px;width:100%;max-width:500px;margin-bottom:16px;}
  .btn{padding:12px 32px;border-radius:8px;font-size:14px;font-weight:600;font-family:'Rajdhani',sans-serif;letter-spacing:2px;cursor:pointer;border:none;text-transform:uppercase;transition:all 0.2s;min-width:140px;}
  .btn-shot{background:#0d47a1;color:#4fc3f7;border:1px solid #1565c0;}
  .btn-shot:hover:not(:disabled){background:#1565c0;box-shadow:0 0 16px rgba(79,195,247,0.3);}
  .btn-shot:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-restart{background:transparent;color:#546e7a;border:1px solid #263238;display:none;}
  .btn-restart:hover{color:#78909c;border-color:#37474f;}

  .result-panel{width:100%;max-width:500px;border-radius:12px;padding:16px;display:none;margin-bottom:16px;}
  .result-panel.pass{background:rgba(0,100,0,0.2);border:1px solid rgba(0,200,83,0.4);}
  .result-panel.fail{background:rgba(100,0,0,0.2);border:1px solid rgba(229,57,53,0.4);}
  .result-panel.partial{background:rgba(100,60,0,0.2);border:1px solid rgba(255,160,0,0.4);}

  .result-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .result-emoji{font-size:28px;}
  .result-verdict{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;}
  .pass .result-verdict{color:#00c853;}
  .fail .result-verdict{color:#e53935;}
  .partial .result-verdict{color:#ffa000;}

  .conf-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .conf-bar{flex:1;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
  .conf-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}
  .pass .conf-fill{background:#00c853;}
  .fail .conf-fill{background:#e53935;}
  .partial .conf-fill{background:#ffa000;}
  .conf-num{font-size:12px;font-weight:500;min-width:36px;text-align:right;}
  .pass .conf-num{color:#00c853;}
  .fail .conf-num{color:#e53935;}
  .partial .conf-num{color:#ffa000;}

  .result-detail{font-size:12px;color:#90a4ae;line-height:1.6;}

  .reward-card{width:100%;max-width:500px;border-radius:12px;padding:16px;background:rgba(13,71,161,0.25);border:1px solid rgba(79,195,247,0.35);display:none;text-align:center;}
  .reward-title{font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:2px;color:#546e7a;margin-bottom:8px;}
  .reward-link{display:inline-block;padding:10px 24px;background:#0d47a1;color:#4fc3f7;text-decoration:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;border:1px solid #1565c0;transition:all 0.2s;}
  .reward-link:hover{background:#1565c0;box-shadow:0 0 20px rgba(79,195,247,0.4);}

  .loading-wrap{display:none;flex-direction:column;align-items:center;gap:8px;padding:8px 0;}
  .loading-dots{display:flex;gap:5px;}
  .loading-dots span{width:6px;height:6px;border-radius:50%;background:#4fc3f7;animation:dot 1.2s ease-in-out infinite;}
  .loading-dots span:nth-child(2){animation-delay:.2s;}
  .loading-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}
  .loading-text{font-size:11px;color:#546e7a;letter-spacing:1px;}
</style>
</head>

      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>

    <button class="btn btn-shot" id="btn-main" onclick="handleMain()">📸 SHOT</button>
    <button class="btn btn-restart" id="btn-restart" onclick="restart()">↺ RETRY</button>
  </div>

  <div class="loading-wrap" id="loading">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <div class="loading-text">AI กำลังวิเคราะห์...</div>
  </div>

    <div class="result-top">
      <span class="result-emoji" id="r-emoji"></span>
      <span class="result-verdict" id="r-verdict"></span>
    </div>

      <div class="conf-bar"><div class="conf-fill" id="conf-fill" style="width:0%"></div></div>
      <span class="conf-num" id="conf-num">0%</span>

  </div>

    <div class="reward-title">REWARD UNLOCKED</div>
    <a class="reward-link" href="https://www.instagram.com/pythoxie/" target="_blank">
      👤 facebook.com/kivkungX
    </a>
  </div>

<script>
const video = document.getElementById('video');
const snapshot = document.getElementById('snapshot');
const camStatus = document.getElementById('cam-status');
const btnMain = document.getElementById('btn-main');
const btnRestart = document.getElementById('btn-restart');
const loading = document.getElementById('loading');
const resultPanel = document.getElementById('result-panel');
const rewardCard = document.getElementById('reward-card');
const scanLine = document.getElementById('scan-line');

let stream = null;
let shotMode = false;

async function initCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});
    video.srcObject = stream;
    camStatus.textContent = 'READY — ลองแลบลิ้น!';
  } catch(e) {
    camStatus.textContent = 'ไม่สามารถเข้าถึงกล้องได้';
    btnMain.disabled = true;
  }
}

function handleMain() {
  if (!shotMode) takeShot();
}

function takeShot() {
  shotMode = true;
  const ctx = snapshot.getContext('2d');
  snapshot.width = video.videoWidth || 640;
  snapshot.height = video.videoHeight || 480;
  ctx.drawImage(video, 0, 0);
  snapshot.style.display = 'block';
  video.style.display = 'none';
  scanLine.style.display = 'none';
  camStatus.textContent = 'CAPTURED';
  btnMain.disabled = true;
  analyze();
}

async function analyze() {
  loading.style.display = 'flex';
  resultPanel.style.display = 'none';
  rewardCard.style.display = 'none';

  // 1. สร้าง Canvas ย่อขนาดรูปภาพลงเหลือความกว้าง 480px (เบามากและ AI เห็นชัดเจนพอ)
  const resizeCanvas = document.createElement('canvas');
  const ctx = resizeCanvas.getContext('2d');
  
  resizeCanvas.width = 480;
  resizeCanvas.height = (video.videoHeight / video.videoWidth) * 480;
  
  // วาดรูปจากกล้องลงไป
  ctx.drawImage(video, 0, 0, resizeCanvas.width, resizeCanvas.height);

  // 2. ดึงเป็น JPEG คุณภาพ 50% (ไฟล์จะเล็กมาก ไม่เกิน 30-50 KB หมดปัญหาภาพใหญ่เกินไปแน่นอน)
  const fullBase64 = resizeCanvas.toDataURL('image/jpeg', 0.5);

  try {
    // 3. ยิงไปที่ Backend
    const res = await fetch('https://cat-challenge-api.onrender.com/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: fullBase64 }) // ส่งตัวแปรที่มีข้อมูลสมบูรณ์ไป เดี๋ยวหลังบ้านจัดการล้างข้อมูลให้เอง
    });
    
    const parsed = await res.json();
    showResult(parsed);
  } catch(e) {
    showResult({score:0, verdict_th:'เชื่อมต่อล้มเหลว', detail_th:'ไม่สามารถดึงข้อมูลจากระบบวิเคราะห์ได้'});
  }
  loading.style.display = 'none';
  btnRestart.style.display = 'block';
}

function showResult(d) {
  const score = Math.min(100, Math.max(0, d.score||0));
  const level = score >= 70 ? 'pass' : score >= 40 ? 'partial' : 'fail';
  const icons = {pass:'🎉', partial:'😐', fail:'❌'};

  resultPanel.className = `result-panel ${level}`;
  resultPanel.style.display = 'block';
  document.getElementById('r-emoji').textContent = icons[level];
  document.getElementById('r-verdict').textContent = d.verdict_th || '';
  document.getElementById('conf-fill').style.width = score + '%';
  document.getElementById('conf-num').textContent = score + '%';
  document.getElementById('r-detail').textContent = d.detail_th || '';

  if (level === 'pass') {
    rewardCard.style.display = 'block';
  }
}

function restart() {
  shotMode = false;
  snapshot.style.display = 'none';
  video.style.display = 'block';
  scanLine.style.display = 'block';
  camStatus.textContent = 'READY — ลองแลบลิ้น!';
  btnMain.disabled = false;
  btnRestart.style.display = 'none';
  resultPanel.style.display = 'none';
  rewardCard.style.display = 'none';
  loading.style.display = 'none';
}

initCam();
</script>
